name: Build Geometrium

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build Raylib
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git
        mkdir -p raylib/build && cd raylib/build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DPLATFORM=Android \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_GAMES=OFF ..
        make -j$(nproc)

    - name: Build Game Library
      run: |
        TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        SYSROOT="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
        
        # Компиляция
        "$TOOLCHAIN/aarch64-linux-android21-clang" -c main.c -o main.o \
          -I./raylib/src -DPLATFORM_ANDROID -DGRAPHICS_API_OPENGL_ES2 -fPIC -O2

        # Линковка. 
        # ВАЖНО: -Wl,-u,ANativeActivity_onCreate заставляет линкер оставить точку входа Android
        "$TOOLCHAIN/aarch64-linux-android21-clang" main.o -o libmain.so \
          -shared -fPIC \
          -L./raylib/build/raylib -Wl,--whole-archive -lraylib -Wl,--no-whole-archive \
          -landroid -llog -lGLESv2 -lEGL -lm -lc \
          -Wl,-u,ANativeActivity_onCreate

    - name: Package APK
      run: |
        BT="$ANDROID_HOME/build-tools/34.0.0"
        mkdir -p staging/lib/arm64-v8a
        cp libmain.so staging/lib/arm64-v8a/libmain.so
        
        # Сборка манифеста и ресурсов
        "$BT/aapt" package -f -M AndroidManifest.xml -I "$ANDROID_HOME/platforms/android-34/android.jar" -F unsigned.apk staging/
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk
        
        # Подпись (V1 + V2 + V3) для максимальной совместимости
        keytool -genkey -v -keystore d.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G"
        "$BT/apksigner" sign --ks d.keystore --ks-pass pass:android --out Geometrium2D.apk aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-Final
        path: Geometrium2D.apk
