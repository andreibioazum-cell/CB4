name: Build Fast Raylib Android

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Raylib
      id: cache-raylib
      uses: actions/cache@v3
      with:
        path: raylib_lib
        key: raylib-android-v5-arm64

    - name: Install Android SDK/NDK
      run: |
        sudo apt-get update && sudo apt-get install -y cmake
        echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk-bundle" >> $GITHUB_ENV

    - name: Build Raylib (only if not cached)
      if: steps.cache-raylib.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git
        mkdir -p raylib/build && cd raylib/build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-24 -DPLATFORM=Android \
          -DBUILD_EXAMPLES=OFF -DBUILD_GAMES=OFF ..
        make -j$(nproc)
        cd ../..
        mkdir -p raylib_lib
        cp raylib/build/raylib/libraylib.a raylib_lib/
        cp raylib/src/raylib.h raylib/src/raymath.h raylib/src/rlgl.h raylib_lib/

    - name: Build Game Logic
      run: |
        $ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang \
        main.c -o libmain.so \
        -I./raylib_lib -L./raylib_lib -lraylib \
        -fPIC -shared -DPLATFORM_ANDROID -DGRAPHICS_API_OPENGL_ES2 \
        -landroid -llog -lGLESv2 -lEGL -lm -lc

    - name: Package APK
      run: |
        BT="$ANDROID_SDK_ROOT/build-tools/34.0.0"
        mkdir -p staging/lib/arm64-v8a
        cp libmain.so staging/lib/arm64-v8a/
        
        # Минимальный пакет для совместимости
        "$BT/aapt" package -f -M AndroidManifest.xml -I "$ANDROID_SDK_ROOT/platforms/android-34/android.jar" -F unsigned.apk staging/
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk
        
        # Подпись
        keytool -genkey -v -keystore d.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G"
        "$BT/apksigner" sign --ks d.keystore --ks-pass pass:android --out Geometrium2D.apk aligned.apk

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-Fast
        path: Geometrium2D.apk
