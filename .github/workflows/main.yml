name: Ultimate Android Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Build Raylib
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib.git
        mkdir -p raylib/build && cd raylib/build
        cmake -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 \
          -DPLATFORM=Android -DBUILD_EXAMPLES=OFF -DBUILD_GAMES=OFF ..
        make -j$(nproc)

    - name: Build Shared Library
      run: |
        TOOLCHAIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        
        # Компилируем объектный файл
        "$TOOLCHAIN/aarch64-linux-android21-clang" -c main.c -o main.o \
          -O2 -fPIC -DPLATFORM_ANDROID -DGRAPHICS_API_OPENGL_ES2 -I./raylib/src

        # Собираем .so библиотеку. ВАЖНО: порядок аргументов имеет значение!
        "$TOOLCHAIN/aarch64-linux-android21-clang" main.o -o libmain.so \
          -shared -fPIC \
          -L./raylib/build/raylib \
          -Wl,--whole-archive -lraylib -Wl,--no-whole-archive \
          -Wl,-soname,libmain.so \
          -landroid -llog -lGLESv2 -lEGL -lm -lc

    - name: Package APK
      run: |
        BT="$ANDROID_HOME/build-tools/34.0.0"
        # Готовим структуру
        mkdir -p staging/lib/arm64-v8a
        cp libmain.so staging/lib/arm64-v8a/libmain.so
        
        # Сборка
        "$BT/aapt" package -f -M AndroidManifest.xml -I "$ANDROID_HOME/platforms/android-34/android.jar" -F unsigned.apk staging/
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk
        
        # Подпись
        keytool -genkey -v -keystore d.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G"
        "$BT/apksigner" sign --ks d.keystore --ks-pass pass:android --v1-signing-enabled true --v2-signing-enabled true --out Geometrium2D.apk aligned.apk

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-Test
        path: Geometrium2D.apk
