name: Build Geometrium

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Install SDK packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-33" "build-tools;33.0.2"

    - name: Clone Raylib
      run: git clone --depth 1 --branch 5.0 https://github.com/raysan5/raylib.git

    - name: Build Raylib Android
      run: |
        mkdir -p raylib/build && cd raylib/build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-21 \
          -DPLATFORM=Android \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_GAMES=OFF \
          -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)

    - name: Build Game
      run: |
        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
        
        # Компилируем только наш main.c
        # Raylib УЖЕ содержит в себе native_app_glue, второй раз его добавлять нельзя!
        "$TOOLCHAIN/aarch64-linux-android21-clang" main.c -o libmain.so \
          -I./raylib/src \
          -L./raylib/build/raylib \
          -shared -fPIC -O2 \
          -DPLATFORM_ANDROID -DGRAPHICS_API_OPENGL_ES2 \
          -Wl,--whole-archive -lraylib -Wl,--no-whole-archive \
          -landroid -llog -lGLESv2 -lEGL -lm -lc

    - name: Package APK
      run: |
        BT="$ANDROID_HOME/build-tools/33.0.2"
        mkdir -p staging/lib/arm64-v8a
        cp libmain.so staging/lib/arm64-v8a/libmain.so

        # Создаем пакет
        "$BT/aapt" package -f -M AndroidManifest.xml \
          -I "$ANDROID_HOME/platforms/android-33/android.jar" \
          -F unsigned.apk staging/

        # Выравнивание
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk

        # Подпись
        keytool -genkey -v -keystore k.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=G"
        "$BT/apksigner" sign --ks k.keystore --ks-pass pass:android --out Geometrium2D.apk aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium2D
        path: Geometrium2D.apk
