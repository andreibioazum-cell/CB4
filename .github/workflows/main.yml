name: Build 3D
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
    - name: Build
      run: |
        NDK_ROOT=$ANDROID_NDK_ROOT
        TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        GLUE="$NDK_ROOT/sources/android/native_app_glue"
        SRCS="main.c $GLUE/android_native_app_glue.c"
        FLAGS="-O3 -s -fPIC -shared -I$GLUE -landroid -llog -lm"
        
        # Собираем для 64-бит (arm64-v8a)
        "$TOOLCHAIN/aarch64-linux-android21-clang" $SRCS -o libmain_64.so $FLAGS
        
        # Собираем для 32-бит (armeabi-v7a)
        "$TOOLCHAIN/armv7a-linux-androideabi21-clang" $SRCS -o libmain_32.so $FLAGS

    - name: Package
      run: |
        # Создаем папки для обеих архитектур
        mkdir -p staging/lib/arm64-v8a
        mkdir -p staging/lib/armeabi-v7a
        
        cp libmain_64.so staging/lib/arm64-v8a/libmain.so
        cp libmain_32.so staging/lib/armeabi-v7a/libmain.so
        
        SDK_ROOT=$ANDROID_HOME
        BT="$SDK_ROOT/build-tools/34.0.0"
        
        "$BT/aapt" package -f -M ./AndroidManifest.xml -I "$SDK_ROOT/platforms/android-34/android.jar" -F unsigned.apk ./staging/
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk
        
        keytool -genkey -v -keystore debug.keystore -storepass android -alias debug -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Debug"
        "$BT/apksigner" sign --ks debug.keystore --ks-pass pass:android --out Game.apk aligned.apk
        
    - uses: actions/upload-artifact@v4
      with:
        name: Game-APK
        path: Game.apk
