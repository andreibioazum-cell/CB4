name: Debug Structure

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Clone and Check Structure
      run: |
        git clone --depth 1 https://github.com/raysan5/raylib-game-template.git template
        echo "=== ROOT ==="
        ls -la template/
        echo "=== FIND GRADLEW ==="
        find template -name "gradlew" 2>/dev/null
        echo "=== FIND GRADLE ==="
        find template -name "*.gradle" 2>/dev/null
        echo "=== FULL TREE ==="
        find template -type f 2>/dev/null
