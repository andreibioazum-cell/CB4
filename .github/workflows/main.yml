name: Auto Raymob Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Clone Raymob Template
      run: |
        git clone https://github.com/raylib-extras/raymob.git project

    - name: Replace main.c
      run: |
        cp main.c project/app/src/main/cpp/main.c

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK
      run: |
        yes | sdkmanager --licenses
        sdkmanager "ndk;25.2.9519653"

    - name: Build APK
      run: |
        cd project
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium
        path: project/app/build/outputs/apk/release/app-release.apk
